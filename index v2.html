<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tururu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: -apple-system, sans-serif; }

    .phone {
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .screen {
      width: 320px;
      height: 580px;
      background: #ffffff;
      border-radius: 48px;
      border: 12px solid #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 260px;
    }

    .pad {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      border: none;
      outline: none;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .pad:active, .pad.playing {
      transform: scale(0.92);
      filter: brightness(0.85);
    }

    .app-name {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 3px;
      color: #888;
      text-transform: lowercase;
      position: absolute;
      bottom: 45px;
    }
  </style>
</head>
<body>

  <div class="phone">
    <div class="screen">
      <div class="grid">
        <button class="pad" id="pad1" style="background:#CB0104;"></button>
        <button class="pad" id="pad2" style="background:#FFB60A;"></button>
        <button class="pad" id="pad3" style="background:#0072A3;"></button>
        <button class="pad" id="pad4" style="background:#8BCC00;"></button>
      </div>
      <span class="app-name">tururu</span>
    </div>
  </div>

  <script>
    // === SONIDOS ASIGNADOS ===
    const sounds = {
      pad1: new Audio("C Tu.mp3"),
      pad2: new Audio("E Turu.mp3"),
      pad3: new Audio("G Tururu.mp3"),
      pad4: new Audio("A Turururu.mp3")
    };

    // Configurar volumen y precarga
    Object.values(sounds).forEach(audio => {
      audio.volume = 0.8;
      audio.load();
    });

    // Control de clones activos por cada sonido
    const clonesActivos = {
      pad1: 0,
      pad2: 0,
      pad3: 0,
      pad4: 0
    };
    const MAX_CLONES_POR_SONIDO = 6; // Máximo 6 reproducciones simultáneas por botón

    function playSoundWithoutStopping(audioOriginal, padId) {
      // Si ya hay muchos clones de este sonido, no reproducir (evita clipping)
      if (clonesActivos[padId] >= MAX_CLONES_POR_SONIDO) return;
      
      const clone = audioOriginal.cloneNode();
      clone.volume = audioOriginal.volume;
      clone.currentTime = 0;
      
      clonesActivos[padId]++;
      
      clone.play().catch(e => {
        // Si falla, disminuir el contador igualmente
        clonesActivos[padId]--;
      });
      
      clone.onended = () => {
        clone.remove();
        clonesActivos[padId]--;
      };
    }

    document.querySelectorAll('.pad').forEach(pad => {
      pad.addEventListener('pointerdown', () => {
        const id = pad.id;
        const audio = sounds[id];
        
        playSoundWithoutStopping(audio, id);

        pad.classList.add('playing');
        setTimeout(() => pad.classList.remove('playing'), 300);
      });
    });
</script>
</body>
</html>
